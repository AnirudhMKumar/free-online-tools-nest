<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Online Tools Nest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #171717;
    }
    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #ebebeb;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .header p {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .search-box {
      padding: 10px 16px;
    }
    .search-box input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ebebeb;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-box input:focus {
      border-color: #0070f3;
    }
    .categories {
      padding: 0 16px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .categories button {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid #ebebeb;
      border-radius: 100px;
      background: #fff;
      color: #4d4d4d;
      cursor: pointer;
      transition: all 0.15s;
    }
    .categories button:hover,
    .categories button.active {
      background: #171717;
      color: #fff;
      border-color: #171717;
    }
    .tools-list {
      max-height: 300px;
      overflow-y: auto;
      padding: 0 16px 16px;
    }
    .tool-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px;
      border-radius: 6px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }
    .tool-item:hover {
      background: #f5f5f5;
    }
    .tool-icon {
      font-size: 18px;
      width: 28px;
      text-align: center;
    }
    .tool-name {
      font-size: 13px;
      font-weight: 500;
    }
    .tool-desc {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #ebebeb;
      text-align: center;
    }
    .footer a {
      font-size: 11px;
      color: #888;
      text-decoration: none;
    }
    .footer a:hover {
      color: #171717;
    }
    .no-results {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ Free Online Tools Nest</h1>
    <p>Quick access to all tools</p>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Search tools..." autocomplete="off" />
  </div>
  <div class="categories" id="categories"></div>
  <div class="tools-list" id="tools-list"></div>
  <div class="no-results" id="no-results" style="display:none;">No tools match your search.</div>
  <div class="footer">
    <a href="https://freeonlinetoolsnest.com/tools/" target="_blank">View all tools →</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
