              - generic [ref=e424]: "01"
              - heading "Open the tool" [level=3] [ref=e425]
              - paragraph [ref=e426]: Pick a tool from the catalog. The JavaScript loads with the page, no login screen between you and the tool.
            - generic [ref=e427]:
              - generic [ref=e428]: "02"
              - heading "Drop your file or text" [level=3] [ref=e429]
              - paragraph [ref=e430]: Upload a file or paste text. Processed entirely in your browser for maximum privacy and security.
            - generic [ref=e431]:
              - generic [ref=e432]: "03"
              - heading "Adjust the settings" [level=3] [ref=e433]
              - paragraph [ref=e434]: Compression, dimensions, page range, format. Defaults work for most, so feel free to skip.
